name: template-compose-success-passes-value
category: eval
description: Matcher composition preserves the original subject when both matchers succeed
input:
  source: |
    left(n) = some(n + 100)
    right(n) = some(n * 2)
    3 @? (left & right)
expected:
  stdout: "some(3)\n"
  stderr: ""
  exit_code: 0
