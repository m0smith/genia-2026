name: parse-jsonl-record-blank-lines
category: eval
description: parse_jsonl_record returns none(context) for empty and whitespace-only lines
input:
  source: |
    describe(result) =
      none(reason, ctx) -> [reason, ctx.kind, ctx.status, ctx.reason, ctx.line] |
      _ -> [quote(unexpected)]

    [
      describe(parse_jsonl_record("")),
      describe(parse_jsonl_record("   "))
    ]
expected:
  stdout: "[[\"blank_line\", jsonl_record, skipped, blank_line, \"\"], [\"blank_line\", jsonl_record, skipped, blank_line, \"   \"]]\n"
  stderr: ""
  exit_code: 0
notes: |
  issue: 389, 410
  contract: empty or whitespace-only record lines are skipped as none(context), not malformed data, and context keeps the exact original line.
