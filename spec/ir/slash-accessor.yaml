name: slash-accessor
category: ir
description: "Legacy compatibility: slash named access lowers as IrBinary with op SLASH (dot is the canonical source form); this is narrow named access, not general field-path lookup"
input:
  source: |
    person/name
expected:
  ir:
    - node: IrExprStmt
      expr:
        node: IrBinary
        left:
          node: IrVar
          name: person
        op: SLASH
        right:
          node: IrVar
          name: name
