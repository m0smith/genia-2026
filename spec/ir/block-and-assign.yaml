name: block-and-assign
category: ir
description: Block lowers as IrBlock; assignment in block lowers as IrAssign (not IrExprStmt)
input:
  source: |
    { x = 1
      x }
expected:
  ir:
    - node: IrExprStmt
      expr:
        node: IrBlock
        exprs:
          - node: IrAssign
            name: x
            expr:
              node: IrLiteral
              value: 1
          - node: IrVar
            name: x
