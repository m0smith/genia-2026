name: template-compose
category: ir
description: The matcher composition operator lowers as standalone portable binary IR
input:
  source: |
    left & right
expected:
  ir:
    - node: IrExprStmt
      expr:
        node: IrBinary
        left:
          node: IrVar
          name: left
        op: AMP
        right:
          node: IrVar
          name: right
