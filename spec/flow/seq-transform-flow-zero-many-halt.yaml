name: seq-transform-flow-zero-many-halt
category: flow
input:
  source: |
    step(state, row) =
      (_, "skip") -> { emit: [] } |
      (_, "stop") -> { emit: ["done"], halt: true } |
      (_, row) -> { emit: [row, concat(row, "!")] }

    ["1", "skip", "2", "stop", "3"]
      |> lines
      |> _seq_transform(0, step)
      |> collect
expected:
  stdout: "[\"1\", \"1!\", \"2\", \"2!\", \"done\"]\n"
  stderr: ""
  exit_code: 0
