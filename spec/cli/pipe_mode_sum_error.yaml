id: pipe_mode_sum_error
name: pipe_mode_sum_error
category: cli
description: Pipe mode rejects a bare reducer stage.
input:
  source: "sum"
  file: null
  command: "sum"
  stdin: |-
    10
    20
  argv: []
  debug_stdio: false
expected:
