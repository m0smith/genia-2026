name: parse-template-at-assert
category: parse
description: The @! matcher-assert operator parses as an infix binary expression
input:
  source: "value @! matcher"
expected:
  parse:
    kind: ok
    ast:
      kind: Binary
      op: "@!"
      left:
        kind: Var
        name: value
      right:
        kind: Var
        name: matcher

