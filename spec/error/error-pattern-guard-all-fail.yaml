name: error-pattern-guard-all-fail
category: error
description: PatternMatchError when all guarded arms fail their guard condition
input:
  source: |
    classify(x) =
      x ? x > 100 -> "big" |
      x ? x > 50 -> "medium"
    classify(10)
expected:
