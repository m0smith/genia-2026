site_name: Genia
site_url: https://m0smith.github.io/genia-2026/
repo_url: https://github.com/m0smith/genia-2026
repo_name: m0smith/genia-2026
docs_dir: .tmp/mkdocs-docs
site_dir: site
strict: true

theme:
  name: material

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - fenced_code
  - tables

nav:
  - Home: index.md
  - Reference:
      - Current State: GENIA_STATE.md
      - Language Rules: GENIA_RULES.md
      - REPL Guide: GENIA_REPL_README.md

  - Cheatsheets:
      - Core: cheatsheet/core.md
      - Quick Reference: cheatsheet/quick-reference.md
      - Pipeline Flow vs Value: cheatsheet/piepline-flow-vs-value.md
      - Unix Power Mode: cheatsheet/unix-power-mode.md
      - Unix to Genia: cheatsheet/unix-to-genia.md

  - Style:
      - "@doc Style Guide": style/doc-style.md

  - Design:
      - Pipeline Semantics: design/pipeline-semantics.md

  - Architecture:
      - Core IR Portability: architecture/core-ir-portability.md

  - Host Interop:
      - Overview: host-interop/README.md
      - Host Interop Contract: host-interop/HOST_INTEROP.md
      - Host Porting Guide: host-interop/HOST_PORTING_GUIDE.md
      - Host Capability Matrix: host-interop/HOST_CAPABILITY_MATRIX.md
      - Capabilities: host-interop/capabilities.md
      - Capability Registry Design: host-interop/capability-registry-design.md
      - Capability Registry Spec: host-interop/capability-registry-spec.md