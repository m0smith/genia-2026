name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  cheatsheet:
    name: Cheatsheet validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --dev
      - name: Run cheatsheet tests
        run: uv run pytest -q tests/unit/test_cheatsheet_*.py

  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --dev

      - name: Lint (ruff)
        run: uvx ruff check .

      - name: Run tests
        run: uv run pytest -q -vv --maxfail=1 -m "not slow" -n auto

      - name: Run semantic specs
        run: UV_CACHE_DIR=/tmp/uv-cache uv run python -m tools.spec_runner

      - name: Run tests with coverage
        run: uv run pytest --cov=genia --cov-report=term-missing -m "not slow" -n auto

  slow-tests:
    name: Slow tests (${{ matrix.section }}, py${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]
        section: ["unit", "spec"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --dev

      - name: Run slow tests
        run: uv run pytest -q -v -m slow tests/${{ matrix.section }}/
