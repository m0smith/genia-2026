name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  cheatsheet:
    name: Cheatsheet validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --dev
      - name: Run cheatsheet tests
        run: uv run pytest -q tests/unit/test_cheatsheet_*.py

  test:
    runs-on: ubuntu-latest
    # 3.15 is allowed to fail (continue-on-error) until it ships stable (2026-10-01).
    continue-on-error: ${{ matrix.experimental || false }}

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        include:
          - python-version: "3.15"
            experimental: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --dev

      - name: Lint (ruff)
        run: uvx ruff check .

      - name: Run tests
        run: uv run pytest -q -vv --maxfail=1 -m "not slow" -n auto

      - name: Run semantic specs
        run: UV_CACHE_DIR=/tmp/uv-cache uv run python -m tools.spec_runner

      - name: Run tests with coverage
        run: uv run pytest --cov=genia --cov-report=term-missing -m "not slow" -n auto

  slow-tests:
    name: Slow tests (${{ matrix.section }}, py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    # 3.15 is allowed to fail (continue-on-error) until it ships stable (2026-10-01).
    continue-on-error: ${{ matrix.experimental || false }}

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        section: ["unit", "spec", "demo"]
        include:
          - python-version: "3.15"
            section: "unit"
            experimental: true
          - python-version: "3.15"
            section: "spec"
            experimental: true
          - python-version: "3.15"
            section: "demo"
            experimental: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --dev

      - name: Run slow tests
        run: uv run pytest -q -v -m slow tests/${{ matrix.section }}/

  extension:
    name: VS Code extension (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode/genia-debugger

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vscode/genia-debugger/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build and test extension
        run: npm test
